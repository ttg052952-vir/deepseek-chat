<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-config {
            padding: 15px 20px;
            background: #f7f9fc;
            border-bottom: 1px solid #e1e8ed;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .api-input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .api-input-group button {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .api-input-group button:active {
            transform: scale(0.98);
        }

        .model-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #4a90e2;
            color: white;
        }

        .message.assistant .message-content {
            background: #f0f2f5;
            color: #333;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .message.user .avatar {
            background: #4a90e2;
            color: white;
        }

        .message.assistant .avatar {
            background: #764ba2;
            color: white;
        }

        .typing-indicator {
            display: none;
            padding: 12px 15px;
            background: #f0f2f5;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e8ed;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #4a90e2;
        }

        .input-area button {
            padding: 12px 24px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .input-area button:active {
            transform: scale(0.98);
        }

        .clear-btn {
            background: #ff4757 !important;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 85%;
                font-size: 14px;
            }
            
            .api-input-group {
                flex-direction: column;
            }
            
            .input-area button {
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 DeepSeek AI 助手</h1>
            <p>由 DeepSeek API 提供支持</p>
        </div>

        <div class="api-config">
            <div class="api-input-group">
                <input type="password" id="apiKey" placeholder="请输入 DeepSeek API Key" autocomplete="off">
                <button onclick="saveApiKey()">保存</button>
            </div>
            <select id="modelSelect" class="model-select">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-coder">DeepSeek Coder</option>
            </select>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="message-content">你好！我是 DeepSeek AI 助手。请先在顶部输入你的 API Key 开始对话吧！</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">发送</button>
            <button onclick="clearChat()" class="clear-btn">清空</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];

        // 保存API Key到localStorage
        function saveApiKey() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (apiKey) {
                localStorage.setItem('deepseek_api_key', apiKey);
                alert('API Key 已保存！');
            } else {
                alert('请输入有效的 API Key');
            }
        }

        // 加载保存的API Key
        function loadApiKey() {
            const savedKey = localStorage.getItem('deepseek_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        }

        // 添加消息到界面
        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            // 显示动画
            setTimeout(() => {
                const typingDiv = indicator.querySelector('.typing-indicator');
                if (typingDiv) typingDiv.style.display = 'block';
            }, 10);
        }

        // 隐藏打字指示器
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 发送消息到DeepSeek API
        async function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();
            
            if (!message) return;
            
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置 API Key');
                return;
            }
            
            // 添加用户消息
            addMessage('user', message);
            userInput.value = '';
            
            // 添加到对话历史
            conversationHistory.push({ role: 'user', content: message });
            
            // 显示打字指示器
            showTypingIndicator();
            
            try {
                const model = document.getElementById('modelSelect').value;
                
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API 请求失败');
                }
                
                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                // 添加助手回复
                addMessage('assistant', assistantMessage);
                
                // 添加到对话历史
                conversationHistory.push({ role: 'assistant', content: assistantMessage });
                
                // 限制历史记录长度（避免token过多）
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `抱歉，发生错误：${error.message}\n\n请检查：\n1. API Key 是否正确\n2. 账户余额是否充足\n3. 网络连接是否正常`);
            } finally {
                hideTypingIndicator();
            }
        }
        
        // 清空聊天
        function clearChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            conversationHistory = [];
            addMessage('assistant', '对话已清空！有什么我可以帮你的吗？');
        }
        
        // 页面加载时恢复API Key
        loadApiKey();
        
        // 回车发送消息
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
