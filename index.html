<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek - AI助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --text-primary: #1f1f1f;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
            --user-msg-bg: #1a73e8;
            --assistant-msg-bg: #f0f0f0;
            --hover-bg: rgba(0,0,0,0.05);
            --sidebar-bg: #fafafa;
        }

        [data-theme="dark"] {
            --bg-primary: #1e1e2f;
            --bg-secondary: #2a2a3a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --border-color: #3a3a4a;
            --user-msg-bg: #0d6efd;
            --assistant-msg-bg: #2a2a3a;
            --hover-bg: rgba(255,255,255,0.05);
            --sidebar-bg: #252535;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .chats-section {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: var(--hover-bg);
        }

        .chat-item.active {
            background: var(--hover-bg);
        }

        .chat-name {
            flex: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-item {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            opacity: 0;
            padding: 4px 8px;
        }

        .chat-item:hover .delete-item {
            opacity: 1;
        }

        /* 主内容区 */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            color: var(--text-primary);
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #1a73e8;
        }

        .message.assistant .avatar {
            background: var(--assistant-msg-bg);
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }

        .message.user .message-content {
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--assistant-msg-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* 图片附件样式 */
        .file-attachment {
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .file-attachment img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .message-actions {
            position: absolute;
            bottom: -25px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            background: var(--bg-primary);
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.user .message-actions {
            right: 40px;
        }

        .message.assistant .message-actions {
            left: 40px;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
            color: var(--text-secondary);
        }

        .copy-btn {
            float: right;
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 输入区域 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
        }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .file-preview-item {
            position: relative;
            display: inline-block;
        }

        .file-preview-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .remove-file {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .attach-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
        }

        .message-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            padding: 8px 0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1a73e8;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--assistant-msg-bg);
            border-radius: 18px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .settings-panel {
            position: fixed;
            top: 60px;
            right: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            width: calc(100% - 32px);
            max-width: 320px;
            z-index: 150;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .settings-panel.show {
            transform: translateX(0);
        }

        .settings-panel input, .settings-panel select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .settings-panel button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 隐藏的文件上传 -->
    <input type="file" id="fileInput" accept="image/*,application/pdf,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple>

    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">➕ 新建对话</button>
            <button class="close-sidebar" onclick="closeSidebar()">✕</button>
        </div>
        
        <div class="chats-section">
            <div class="section-title">对话历史</div>
            <div id="chatsList"></div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="navbar">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="logo">
                <div class="logo-icon">D</div>
                <span>DeepSeek</span>
            </div>
            <div class="nav-buttons">
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <input type="password" id="apiKey" placeholder="API Key" autocomplete="off">
            <select id="modelSelect">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-coder">DeepSeek Coder</option>
            </select>
            <button onclick="saveSettings()">保存设置</button>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🤖</div>
                <h2>你好！我是 DeepSeek</h2>
                <p>支持上传图片、PDF、Word、Excel、PPT、TXT文件<br>AI可以读取文件中的文字内容</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-container">
                <div class="file-preview" id="filePreview"></div>
                <div class="input-row">
                    <button class="attach-btn" onclick="openFilePicker()">📎</button>
                    <textarea id="userInput" class="message-input" placeholder="输入消息..." rows="1" onkeydown="handleEnter(event)"></textarea>
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据结构
        let groups = JSON.parse(localStorage.getItem('deepseek_groups') || '[{"id":"default","name":"对话历史","chats":[]}]');
        let currentChatId = localStorage.getItem('currentChatId');
        let currentChatMessages = [];
        let conversationHistory = [];
        let pendingFiles = []; // 待上传的文件

        // 保存数据
        function saveData() {
            localStorage.setItem('deepseek_groups', JSON.stringify(groups));
            if (currentChatId) {
                const group = groups.find(g => g.chats.some(c => c.id === currentChatId));
                if (group) {
                    const chat = group.chats.find(c => c.id === currentChatId);
                    if (chat) {
                        chat.messages = currentChatMessages;
                        chat.history = conversationHistory;
                        chat.updatedAt = Date.now();
                    }
                }
            }
        }

        // 渲染侧边栏
        function renderSidebar() {
            const chatsList = document.getElementById('chatsList');
            const defaultGroup = groups[0];
            const chats = defaultGroup.chats || [];
            chats.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            
            chatsList.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="switchToChat('${chat.id}')">
                    <span class="chat-name">💬 ${escapeHtml(chat.name)}</span>
                    <button class="delete-item" onclick="event.stopPropagation(); deleteChat('${chat.id}')">🗑️</button>
                </div>
            `).join('');
            
            if (chats.length === 0) {
                chatsList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">暂无对话，点击上方新建</div>';
            }
        }

        // 创建新对话
        function createNewChat() {
            const chatName = `对话 ${new Date().toLocaleString()}`;
            const newChat = {
                id: Date.now().toString(),
                name: chatName,
                messages: [],
                history: [],
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            
            groups[0].chats.unshift(newChat);
            currentChatId = newChat.id;
            currentChatMessages = [];
            conversationHistory = [];
            
            saveData();
            renderSidebar();
            renderChatArea();
            closeSidebar();
        }

        // 切换对话
        function switchToChat(chatId) {
            const chat = groups[0].chats.find(c => c.id === chatId);
            if (chat) {
                currentChatId = chatId;
                currentChatMessages = chat.messages || [];
                conversationHistory = chat.history || [];
                renderChatArea();
                renderSidebar();
                closeSidebar();
            }
        }

        // 删除对话
        function deleteChat(chatId) {
            const index = groups[0].chats.findIndex(c => c.id === chatId);
            if (index !== -1) {
                groups[0].chats.splice(index, 1);
            }
            
            if (currentChatId === chatId) {
                currentChatId = null;
                currentChatMessages = [];
                conversationHistory = [];
                renderChatArea();
            }
            
            saveData();
            renderSidebar();
        }

        // 渲染聊天区域
        function renderChatArea() {
            const chatArea = document.getElementById('chatArea');
            
            if (!currentChatId || currentChatMessages.length === 0) {
                chatArea.innerHTML = `<div class="welcome" id="welcomeScreen"><div class="welcome-icon">🤖</div><h2>你好！我是 DeepSeek</h2><p>支持上传图片、PDF、Word、Excel、PPT、TXT文件<br>AI可以读取文件中的文字内容</p></div>`;
                return;
            }
            
            chatArea.innerHTML = '';
            currentChatMessages.forEach(msg => {
                addMessageToDOM(msg.role, msg.content, msg.id, msg.files);
            });
        }

        // 读取文件内容
        async function readFileContent(file) {
            return new Promise((resolve, reject) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ type: 'image', data: e.target.result, name: file.name });
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ type: 'text', data: e.target.result, name: file.name });
                    reader.onerror = reject;
                    reader.readAsText(file);
                }
            });
        }

        // 打开文件选择器
        function openFilePicker() {
            document.getElementById('fileInput').click();
        }

        // 处理文件选择
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            const previewDiv = document.getElementById('filePreview');
            
            for (const file of files) {
                const fileData = await readFileContent(file);
                pendingFiles.push(fileData);
                
                const previewItem = document.createElement('div');
                previewItem.className = 'file-preview-item';
                previewItem.innerHTML = `
                    ${fileData.type === 'image' ? `<img src="${fileData.data}" alt="${fileData.name}">` : `<div style="width:60px;height:60px;background:var(--bg-secondary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;">📄</div>`}
                    <div class="remove-file" onclick="removeFile('${fileData.name}')">✕</div>
                `;
                previewDiv.appendChild(previewItem);
            }
            e.target.value = '';
        });

        // 移除待上传文件
        function removeFile(fileName) {
            pendingFiles = pendingFiles.filter(f => f.name !== fileName);
            document.getElementById('filePreview').innerHTML = '';
            pendingFiles.forEach(file => {
                const previewItem = document.createElement('div');
                previewItem.className = 'file-preview-item';
                previewItem.innerHTML = `
                    ${file.type === 'image' ? `<img src="${file.data}" alt="${file.name}">` : `<div style="width:60px;height:60px;background:var(--bg-secondary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;">📄</div>`}
                    <div class="remove-file" onclick="removeFile('${file.name}')">✕</div>
                `;
                document.getElementById('filePreview').appendChild(previewItem);
            });
        }

        function addMessageToDOM(role, content, messageId = null, files = null) {
            const chatArea = document.getElementById('chatArea');
            const id = messageId || Date.now() + '_' + Math.random();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.setAttribute('data-id', id);
            messageDiv.setAttribute('data-content', content);
            
            let filesHtml = '';
            if (files && files.length > 0) {
                filesHtml = '<div class="file-attachment">';
                for (const file of files) {
                    if (file.type === 'image') {
                        filesHtml += `<img src="${file.data}" class="preview-image" onclick="window.open(this.src)"><br>`;
                    } else {
                        filesHtml += `📎 ${file.name}<br>`;
                    }
                }
                filesHtml += '</div>';
            }
            
            let contentHtml = role === 'assistant' ? marked.parse(content) : escapeHtml(content);
            
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${filesHtml}${contentHtml}</div>
                <div class="message-actions">
                    ${role === 'user' ? `<button class="action-btn" onclick="editMessage('${id}')">✏️</button>` : ''}
                    <button class="action-btn" onclick="deleteMessageById('${id}')">🗑️</button>
                    ${role === 'assistant' ? `<button class="action-btn" onclick="regenerateLastMessage()">🔄</button>` : ''}
                </div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            if (role === 'assistant') {
                messageDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '📋';
                copyBtn.onclick = () => copyToClipboard(content);
                messageDiv.querySelector('.message-content').appendChild(copyBtn);
            }
        }

        function addMessage(role, content, files = null) {
            const id = Date.now() + '_' + Math.random();
            addMessageToDOM(role, content, id, files);
            currentChatMessages.push({ role, content, id, files });
            if (role === 'user') {
                conversationHistory.push({ role, content });
            } else {
                conversationHistory.push({ role, content });
            }
            saveData();
        }

        function deleteMessageById(messageId) {
            const index = currentChatMessages.findIndex(m => m.id === messageId);
            if (index !== -1) {
                currentChatMessages.splice(index, 1);
                if (index < conversationHistory.length) {
                    conversationHistory.splice(index, 1);
                }
                renderChatArea();
                saveData();
            }
        }

        function editMessage(messageId) {
            const msg = currentChatMessages.find(m => m.id === messageId);
            if (!msg || msg.role !== 'user') return;
            
            const newContent = prompt('编辑消息:', msg.content);
            if (newContent && newContent !== msg.content) {
                const msgIndex = currentChatMessages.findIndex(m => m.id === messageId);
                if (msgIndex !== -1) {
                    currentChatMessages = currentChatMessages.slice(0, msgIndex);
                    conversationHistory = conversationHistory.slice(0, msgIndex);
                    addMessage('user', newContent, msg.files);
                    getAIResponse();
                    saveData();
                }
            }
        }

        async function regenerateLastMessage() {
            if (conversationHistory.length < 2) return;
            conversationHistory.pop();
            currentChatMessages.pop();
            renderChatArea();
            await getAIResponse();
        }

        async function getAIResponse() {
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置 API Key');
                toggleSettings();
                return;
            }
            
            showTypingIndicator();
            
            try {
                const model = localStorage.getItem('deepseek_model') || 'deepseek-chat';
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: false
                    })
                });
                
                if (!response.ok) throw new Error('请求失败');
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                hideTypingIndicator();
                addMessage('assistant', reply);
                saveData();
                
            } catch (error) {
                hideTypingIndicator();
                addMessage('assistant', `❌ 错误：${error.message}\n\n请检查 API Key 或账户余额`);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message && pendingFiles.length === 0) return;
            
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置 API Key');
                toggleSettings();
                return;
            }
            
            if (!currentChatId) {
                createNewChat();
            }
            
            // 构建消息内容（包含文件信息）
            let fullMessage = message;
            if (pendingFiles.length > 0) {
                fullMessage = message || "请分析以下文件：";
                for (const file of pendingFiles) {
                    if (file.type === 'image') {
                        fullMessage += `\n[图片: ${file.name}]`;
                    } else {
                        fullMessage += `\n[文件: ${file.name}]\n内容：${file.data.substring(0, 2000)}${file.data.length > 2000 ? '...' : ''}`;
                    }
                }
            }
            
            const filesToSave = [...pendingFiles];
            pendingFiles = [];
            document.getElementById('filePreview').innerHTML = '';
            input.value = '';
            input.style.height = 'auto';
            
            addMessage('user', fullMessage, filesToSave);
            await getAIResponse();
        }

        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `<div class="avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // UI 辅助函数
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('show');
        }
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('deepseek_theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('deepseek_theme', 'dark');
            }
        }
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            if (apiKey) localStorage.setItem('deepseek_api_key', apiKey);
            localStorage.setItem('deepseek_model', model);
            alert('设置已保存');
            toggleSettings();
        }
        function loadSettings() {
            const savedKey = localStorage.getItem('deepseek_api_key');
            const savedModel = localStorage.getItem('deepseek_model');
            const savedTheme = localStorage.getItem('deepseek_theme');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            if (savedModel) document.getElementById('modelSelect').value = savedModel;
            if (savedTheme === 'dark') document.body.setAttribute('data-theme', 'dark');
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('已复制');
        }
        function autoResizeTextarea() {
            const textarea = document.getElementById('userInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }
        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            } else if (event.key === 'Enter' && event.shiftKey) {
                setTimeout(autoResizeTextarea, 0);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            renderSidebar();
            if (currentChatId) {
                const chat = groups[0].chats.find(c => c.id === currentChatId);
                if (chat) {
                    currentChatMessages = chat.messages || [];
                    conversationHistory = chat.history || [];
                    renderChatArea();
                }
            }
            const textarea = document.getElementById('userInput');
            if (textarea) textarea.addEventListener('input', autoResizeTextarea);
        });
    </script>
</body>
</html>
