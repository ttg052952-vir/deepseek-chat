<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek - AI助手</title>
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --text-primary: #1f1f1f;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
            --user-msg-bg: #1a73e8;
            --assistant-msg-bg: #f0f0f0;
            --sidebar-bg: #fafafa;
        }

        [data-theme="dark"] {
            --bg-primary: #1e1e2f;
            --bg-secondary: #2a2a3a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --border-color: #3a3a4a;
            --user-msg-bg: #0d6efd;
            --assistant-msg-bg: #2a2a3a;
            --sidebar-bg: #252535;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            color: var(--text-primary);
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: var(--border-color);
        }

        /* API设置面板 */
        .settings-panel {
            position: fixed;
            top: 60px;
            right: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            width: calc(100% - 32px);
            max-width: 320px;
            z-index: 99;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .settings-panel.show {
            transform: translateX(0);
        }

        .settings-panel input, .settings-panel select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .settings-panel button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .settings-panel button:active {
            opacity: 0.8;
        }

        /* 聊天区域 */
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            padding-bottom: 70px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #1a73e8;
        }

        .message.assistant .avatar {
            background: var(--assistant-msg-bg);
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--assistant-msg-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* Markdown 样式 */
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 12px 0 8px;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        .message-content pre {
            background: #1e1e2e;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: #e0e0e0;
        }

        /* 复制按钮 */
        .copy-btn {
            float: right;
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 输入区域 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #1a73e8;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1a73e8;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active {
            opacity: 0.8;
        }

        /* 打字指示器 */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--assistant-msg-bg);
            border-radius: 18px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* 欢迎界面 */
        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            margin-bottom: 10px;
        }

        .welcome p {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <div class="logo-icon">D</div>
            <span>DeepSeek</span>
        </div>
        <div class="nav-buttons">
            <button class="icon-btn" onclick="toggleTheme()">🌙</button>
            <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
            <button class="icon-btn" onclick="clearChat()">🗑️</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <input type="password" id="apiKey" placeholder="API Key" autocomplete="off">
        <select id="modelSelect">
            <option value="deepseek-chat">DeepSeek Chat</option>
            <option value="deepseek-coder">DeepSeek Coder</option>
        </select>
        <button onclick="saveSettings()">保存设置</button>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🤖</div>
                <h2>你好！我是 DeepSeek</h2>
                <p>输入你的问题，开始对话吧</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let isTyping = false;

        // 加载保存的设置
        function loadSettings() {
            const savedKey = localStorage.getItem('deepseek_api_key');
            const savedModel = localStorage.getItem('deepseek_model');
            const savedTheme = localStorage.getItem('deepseek_theme');
            
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            if (savedModel) document.getElementById('modelSelect').value = savedModel;
            if (savedTheme === 'dark') document.body.setAttribute('data-theme', 'dark');
        }

        // 保存设置
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            
            if (apiKey) localStorage.setItem('deepseek_api_key', apiKey);
            localStorage.setItem('deepseek_model', model);
            alert('设置已保存');
            toggleSettings();
        }

        // 切换设置面板
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('show');
        }

        // 切换主题
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('deepseek_theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('deepseek_theme', 'dark');
            }
        }

        // 添加消息
        function addMessage(role, content, isStreaming = false) {
            const area = document.getElementById('messagesArea');
            const welcome = document.getElementById('welcomeScreen');
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${role === 'assistant' ? marked.parse(content) : escapeHtml(content)}</div>
            `;
            
            area.appendChild(messageDiv);
            area.scrollTop = area.scrollHeight;
            
            if (role === 'assistant' && !isStreaming) {
                // 添加复制按钮
                const contentDiv = messageDiv.querySelector('.message-content');
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '📋';
                copyBtn.onclick = () => copyToClipboard(content);
                contentDiv.appendChild(copyBtn);
                // 代码高亮
                messageDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            }
            
            return messageDiv;
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 复制到剪贴板
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('已复制到剪贴板');
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const area = document.getElementById('messagesArea');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing"><span></span><span></span><span></span></div>
            `;
            area.appendChild(indicator);
            area.scrollTop = area.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先在设置中填写 API Key');
                toggleSettings();
                return;
            }
            
            input.value = '';
            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            
            showTypingIndicator();
            
            try {
                const model = localStorage.getItem('deepseek_model') || 'deepseek-chat';
                
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                hideTypingIndicator();
                addMessage('assistant', reply);
                conversationHistory.push({ role: 'assistant', content: reply });
                
                if (conversationHistory.length > 30) {
                    conversationHistory = conversationHistory.slice(-30);
                }
                
            } catch (error) {
                hideTypingIndicator();
                addMessage('assistant', `❌ 错误：${error.message}\n\n请检查 API Key 是否正确或账户余额是否充足`);
            }
        }
        
        function clearChat() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '<div class="welcome" id="welcomeScreen"><div class="welcome-icon">🤖</div><h2>你好！我是 DeepSeek</h2><p>输入你的问题，开始对话吧</p></div>';
            conversationHistory = [];
        }
        
        loadSettings();
    </script>
</body>
</html>
